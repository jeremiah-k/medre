# yamllint disable rule:quoted-strings
# YAML representation of canonical-event.schema.json
# See canonical-event.schema.json for the authoritative definition.
# Generated from source: src/medre/core/events/canonical.py, metadata.py

$schema: https://json-schema.org/draft/2020-12/schema
$id: https://medre.dev/schemas/canonical-event.schema.json
title: CanonicalEvent
description: >-
  The universal, immutable event envelope for the MEDRE pipeline.
  Every event is represented as a CanonicalEvent.
  Derived from msgspec.Struct with frozen=True.
type: object
properties:
  event_id:
    type: string
    minLength: 1
    description: Globally unique event identifier (UUIDv7 or similar).
  event_kind:
    type: string
    minLength: 1
    description: Event kind string (e.g. 'message.text', 'telemetry.received').
  schema_version:
    type: integer
    minimum: 1
    description: Schema version number for the payload structure. Must be >= 1.
  timestamp:
    type: string
    format: date-time
    description: The moment the event occurred (UTC, timezone-aware ISO-8601).
  source_adapter:
    type: string
    description: Name of the adapter that produced the event.
  source_transport_id:
    type: string
    description: Identifier of the transport that carried the event.
  source_channel_id:
    type: ["string", "null"]
    description: Channel/conversation ID at the source, if applicable.
  parent_event_id:
    type: ["string", "null"]
    description: ID of the parent event in a derivation chain.
  lineage:
    type: array
    items:
      type: string
      minLength: 1
    description: Ordered list of event IDs forming the derivation ancestry.
  relations:
    type: array
    items:
      $ref: "#/$defs/EventRelation"
    description: Typed links to other events.
  payload:
    type: object
    additionalProperties: true
    description: The event-specific data payload.
  metadata:
    $ref: "#/$defs/EventMetadata"
  source_native_ref:
    oneOf:
      - $ref: "#/$defs/NativeRef"
      - type: "null"
    description: Inbound native message reference. None for outbound/internal events.
  depth:
    type: integer
    minimum: 0
    default: 0
    description: Depth in the derivation tree (0 for source events).
  trace_id:
    type: ["string", "null"]
    default: null
    description: Distributed tracing correlation ID.
required:
  - event_id
  - event_kind
  - schema_version
  - timestamp
  - source_adapter
  - source_transport_id
  - source_channel_id
  - parent_event_id
  - lineage
  - relations
  - payload
  - metadata
additionalProperties: false

$defs:
  NativeRef:
    title: NativeRef
    description: Reference to a message in an adapter's native ID space.
    type: object
    properties:
      adapter:
        type: string
        description: Name of the adapter that owns the native namespace.
      native_channel_id:
        type: ["string", "null"]
        description: Channel/conversation ID in the adapter's native format.
      native_message_id:
        type: string
        description: Message ID in the adapter's native format.
      native_thread_id:
        type: ["string", "null"]
        default: null
        description: Thread/parent message ID. Reserved — always None at runtime.
    required: [adapter, native_channel_id, native_message_id]
    additionalProperties: false

  EventRelation:
    title: EventRelation
    description: A typed link from one event to another.
    type: object
    properties:
      relation_type:
        type: string
        enum: [reply, reaction, edit, delete, thread]
        description: The kind of relationship.
      target_event_id:
        type: ["string", "null"]
        description: Canonical event ID of the target, if known.
      target_native_ref:
        oneOf:
          - $ref: "#/$defs/NativeRef"
          - type: "null"
        description: Native-space reference to the target.
      key:
        type: ["string", "null"]
        description: Optional discriminator (e.g. emoji for a reaction).
      fallback_text:
        type: ["string", "null"]
        description: Human-readable fallback text for the target.
      metadata:
        type: object
        additionalProperties: true
        default: {}
        description: Arbitrary key-value metadata attached to this relation.
    required:
      [relation_type, target_event_id, target_native_ref, key, fallback_text]
    additionalProperties: false

  EventMetadata:
    title: EventMetadata
    description: Top-level metadata container carried by every canonical event.
    type: object
    properties:
      transport:
        oneOf:
          - $ref: "#/$defs/TransportMetadata"
          - type: "null"
        default: null
      routing:
        oneOf:
          - $ref: "#/$defs/RoutingMetadata"
          - type: "null"
        default: null
      radio:
        oneOf:
          - $ref: "#/$defs/RadioMetadata"
          - type: "null"
        default: null
      telemetry:
        oneOf:
          - $ref: "#/$defs/TelemetryMetadata"
          - type: "null"
        default: null
      native:
        oneOf:
          - $ref: "#/$defs/NativeMetadata"
          - type: "null"
        default: null
      custom:
        type: object
        additionalProperties: true
        default: {}
        description: Free-form dictionary for extensions and plugins.
    additionalProperties: false

  TransportMetadata:
    title: TransportMetadata
    description: Transport layer metadata.
    type: object
    properties:
      protocol:
        type: ["string", "null"]
        default: null
      substrate:
        type: ["string", "null"]
        default: null
      gateway_id:
        type: ["string", "null"]
        default: null
      delivery_method:
        type: ["string", "null"]
        default: null
      delivery_confirmed:
        type: ["boolean", "null"]
        default: null
      transport_encrypted:
        type: ["boolean", "null"]
        default: null
      signature_valid:
        type: ["boolean", "null"]
        default: null
      propagation_state:
        type: ["string", "null"]
        default: null
    additionalProperties: false

  RoutingMetadata:
    title: RoutingMetadata
    description: Routing subsystem metadata.
    type: object
    properties:
      matched_routes:
        type: array
        items: { type: string }
        default: []
      fanout_group:
        type: ["string", "null"]
        default: null
      route_trace:
        type: array
        items: { type: string }
        default: []
    additionalProperties: false

  RadioMetadata:
    title: RadioMetadata
    description: RF-layer metadata for radio-transport events.
    type: object
    properties:
      snr:
        type: ["number", "null"]
        default: null
      rssi:
        type: ["number", "null"]
        default: null
      channel_index:
        type: ["integer", "null"]
        default: null
      frequency:
        type: ["number", "null"]
        default: null
    additionalProperties: false

  TelemetryMetadata:
    title: TelemetryMetadata
    description: Arbitrary metrics from telemetry-producing events.
    type: object
    properties:
      metrics:
        type: object
        additionalProperties:
          type: ["number", "string", "boolean"]
        default: {}
    additionalProperties: false

  NativeMetadata:
    title: NativeMetadata
    description: Opaque adapter-specific data.
    type: object
    properties:
      data:
        type: object
        additionalProperties: true
        default: {}
    additionalProperties: false
