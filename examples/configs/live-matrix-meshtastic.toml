# MEDRE Example: Live Matrix ↔ Meshtastic Bridge (Controlled Smoke)
#
# Canonical real-device bridge config for controlled live smoke testing.
# NOT for unattended production. Use a throwaway Matrix room and non-critical
# Meshtastic channel.
#
# This config wires two real adapters (Matrix homeserver + Meshtastic serial
# radio) with a single bidirectional route.  Adapter IDs are "matrix" and
# "radio" — short, unambiguous, and used directly in route declarations.
#
# Prerequisites:
#   pip install ".[matrix,meshtastic]"
#   A Meshtastic radio on /dev/ttyACM0 (or change serial_port below)
#   A Matrix bot account with a valid access token
#
# Usage:
#   medre run --config examples/configs/live-matrix-meshtastic.toml

[runtime]
name = "live-matrix-meshtastic"
shutdown_timeout_seconds = 30   # give adapters time to drain on Ctrl-C

[logging]
level = "INFO"  # controls MEDRE namespace only; use DEBUG for bring-up visibility
format = "text" # "text" for humans, "json" for log aggregation
# Dependency loggers stay quiet by default (root WARNING).
# Use [logging.overrides] only when troubleshooting integrations — see docs/runbooks/configuration.md.

[storage]
backend = "sqlite"
path = "{state}/medre.sqlite" # {state} resolves to XDG state dir

# ---------------------------------------------------------------------------
# Matrix transport
# ---------------------------------------------------------------------------
# Fill in your real homeserver URL, bot credentials, and a test room ID.
# encryption_mode = "plaintext" keeps things simple for smoke testing.
# Change to "e2ee_required" once you have vodozemac installed.
[adapters.matrix.matrix]
enabled = true
homeserver = ""                        # REQUIRED — your homeserver URL (e.g. https://matrix.example.com)
user_id = ""                           # REQUIRED — bot user ID (e.g. @mesh-bot:example.com)
access_token = ""                      # REQUIRED — bot access token
room_allowlist = ["!room:example.com"] # REQUIRED — your test room ID
encryption_mode = "plaintext"          # plaintext | e2ee_optional | e2ee_required
# relay_prefix = "[{sender}/{origin_label}]: "    # Meshtastic→Matrix: prepend sender info via target-local prefix

# ---------------------------------------------------------------------------
# Meshtastic transport (serial)
# ---------------------------------------------------------------------------
# Connects to a Meshtastic node over USB-serial.  Change serial_port to
# match your device (common: /dev/ttyACM0, /dev/ttyUSB0, /dev/cu.usbmodem*).
[adapters.meshtastic.radio]
enabled = true
connection_type = "serial"
serial_port = "/dev/ttyACM0"
origin_label = "medre-radio"            # platform-neutral label used in cross-platform prefixes
radio_relay_prefix = "{sender_short}: " # Matrix→Meshtastic: prepend short name (default)
# radio_relay_prefix = ""                             # empty = no prefix for radio direction
# mmrelay_compatibility = true                    # embed mmrelay-compatible metadata in Matrix payloads

# # --- TCP alternative (uncomment and comment out serial lines above) ---
# [adapters.meshtastic.radio]
# enabled = true
# connection_type = "tcp"
# host = "meshtastic.local"
# port = 4403
# origin_label = "medre-radio"
# radio_relay_prefix = "{sender_short}: "
# mmrelay_compatibility = true

# ---------------------------------------------------------------------------
# Route — bidirectional bridge between Matrix and Meshtastic
# ---------------------------------------------------------------------------
# A single bidirectional route expands into two runtime legs:
#   Forward: matrix → radio  (Matrix room → Meshtastic channel)
#   Reverse: radio → matrix  (Meshtastic channel → Matrix room)
#
# The expansion swaps source/dest adapters AND targeting fields:
#   source_room (forward source) becomes dest targeting in the reverse leg.
#   dest_channel (forward dest) becomes source targeting in the reverse leg.
#
# Use bidirectional for symmetric bridges where both sides have the same
# policy.  For asymmetric behavior (different channels/rooms per direction,
# different policies), use two explicit source_to_dest routes instead.
#
# Targeting fields:
#   source_room / dest_room  — Matrix room IDs in !opaque:server format.
#   source_channel / dest_channel — Meshtastic channel indexes as strings.
#   First test channel is "0".

[routes.matrix_radio_bridge]
source_adapters = ["matrix"]
dest_adapters = ["radio"]
directionality = "bidirectional"
enabled = true
source_room = "!room:example.com" # Matrix room to listen on (forward); delivered to in reverse
dest_channel = "0"                # Meshtastic channel index (forward dest; reverse source)
# source_origin_label = "Matrix Bridge"  # override adapter origin_label for forward leg
# dest_origin_label = "Mesh Radio"       # override adapter origin_label for reverse leg

# Retry disabled for bring-up simplicity
