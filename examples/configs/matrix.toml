# MEDRE Example: Matrix Adapter
#
# Single Matrix adapter. Plaintext by default.
# For E2EE, change encryption_mode to "e2ee_required" and
# install the matrix-e2e extra: pip install "medre[matrix-e2e]"
# Copy and adjust for your homeserver and credentials.

[runtime]
name = "matrix-bot"
shutdown_timeout_seconds = 10

[logging]
level = "INFO"
format = "text"

[storage]
backend = "sqlite"
path = "{state}/medre.sqlite"

# --- Matrix transport ---
[adapters.matrix.main]
enabled = true
homeserver = "https://matrix.example.com"
user_id = "@bot:example.com"
access_token = ""
room_allowlist = ["!room:example.com"]
device_id = "MEDREBOT"
store_path = "{state}/matrix/main/store"
encryption_mode = "plaintext"
