# MEDRE Example: Fake Bridge with Retry Worker
#
# Demonstrates config-driven retry for transient adapter failures.
# This is a SEPARATE config from fake-bridge-smoke.yaml because enabling
# the retry worker makes timing non-deterministic (polling intervals,
# backoff delays).  The smoke test config remains deterministic.
#
# Two-level opt-in for retry:
#   1. Per-route retry policy — declared under routes.<id>.retry.
#      When enabled, transient delivery failures produce retry receipts
#      with next_retry_at set.  Routes without a retry section record
#      transient failures without scheduling retries.
#   2. The runtime RetryWorker polls for due retry receipts and
#      re-attempts delivery.  This is controlled by the retry section.
#
# Both levels must be active for automatic retry:
#   - Each route's retry section controls whether retry receipts
#     are scheduled for transient failures on that route.
#   - The top-level retry section controls whether the RetryWorker processes
#     them.
#   - If retry enabled is false (default), retry receipts accumulate but
#     are never processed.  They can be inspected manually.
#
# Use this for:
#   - Validating retry worker configuration
#   - Testing retry/backoff behavior with fake adapters
#   - Understanding the retry receipt lifecycle
#
# All adapters use adapter_kind: fake — no network required.

runtime:
  name: fake-retry-smoke
  shutdown_timeout_seconds: 10

logging:
  level: DEBUG
  format: text

storage:
  backend: memory

# ---------------------------------------------------------------------------
# Retry worker (opt-in)
# ---------------------------------------------------------------------------
#
# Controls the background RetryWorker that polls for due retry receipts.
# This is separate from per-route retry policy (which determines max_attempts
# and backoff for individual delivery failures).
#
# enabled:          Whether the RetryWorker runs at all. Default: false.
# interval_seconds: How often the worker polls for due receipts. Default: 10.
# batch_size:       Max receipts processed per polling cycle. Default: 20.
# max_attempts:     Global max attempts before dead-lettering.  Each route
#                   may override with its own retry section.

retry:
  enabled: true
  interval_seconds: 5.0
  batch_size: 10
  max_attempts: 3

adapters:
  # --- Matrix (fake) ---
  matrix:
    fake_matrix:
      enabled: true
      adapter_kind: fake
      homeserver: https://fake.local
      user_id: "@bridge-bot:fake.local"
      access_token: fake_token_retry_smoke
      room_allowlist:
        - "!retry-room:fake.local"
      encryption_mode: plaintext

  # --- Meshtastic (fake) ---
  meshtastic:
    fake_meshtastic:
      enabled: true
      adapter_kind: fake
      connection_type: fake
      origin_label: retry-radio

# ---------------------------------------------------------------------------
# Routes
# ---------------------------------------------------------------------------

routes:
  # 1. Matrix -> Meshtastic (with retry)
  mx_to_mesh:
    source_adapters:
      - fake_matrix
    dest_adapters:
      - fake_meshtastic
    directionality: source_to_dest
    enabled: true
    retry:
      enabled: true
      max_attempts: 3
      backoff_base: 2.0
      max_delay_seconds: 60.0
      jitter: false

  # 2. Meshtastic -> Matrix (with retry)
  mesh_to_mx:
    source_adapters:
      - fake_meshtastic
    dest_adapters:
      - fake_matrix
    directionality: source_to_dest
    enabled: true
    retry:
      enabled: true
      max_attempts: 3
      backoff_base: 2.0
      max_delay_seconds: 60.0
      jitter: false
