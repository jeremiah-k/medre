# MEDRE Example: Matrix with End-to-End Encryption
#
# Full E2EE configuration for private Matrix rooms. Requires a persistent
# store directory for cryptographic keys and session data.

[runtime]
name = "matrix-e2ee"
shutdown_timeout_seconds = 30

[logging]
level = "INFO"
format = "text"

[storage]
backend = "filesystem"
path = "{state}/store"

[adapters.matrix.main]
enabled = true
homeserver = "https://matrix.example.com"
user_id = "@medre-bot:example.com"
access_token = "syt_example_token_replace_me"
device_id = "MEDREBOT01"

# Room(s) that require encryption
room_allowlist = ["!private-room:example.com"]

# Require E2EE for all messages — messages in unencrypted rooms are rejected
encryption_mode = "e2ee_required"

# Persistent store for crypto keys, cross-signing data, and Olm/Megolm sessions.
# Must survive restarts; losing this means the bot can't decrypt old messages.
store_path = "{state}/matrix/main/store"

# Automatically accept device keys from unverified users.
# Safe for bot accounts that only join trusted rooms — avoids manual verification
# steps that would block message delivery during first contact with new devices.
# For human-operated accounts, set this to false and verify devices manually.
ignore_unverified_devices = true
