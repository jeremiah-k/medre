# MEDRE Example: Docker Meshtastic Bridge (Meshtastic → Fake Matrix)
#
# Routes messages from a containerized meshtasticd daemon to a fake Matrix
# adapter. Useful for SDK-boundary testing without real hardware or a
# live Matrix homeserver.
#
# Provenance level: Docker SDK-boundary
#
# What this config proves when run:
#   - MeshtasticAdapter creates a real TCPInterface to meshtasticd
#   - Adapter subscribes to the "meshtastic.receive" pubsub topic
#   - Adapter reports healthy and exposes meaningful diagnostics
#   - Outbound deliver() → enqueue → send_one() → real sendText() works
#   - meshtasticd accepts outbound sends and returns real packet IDs
#   - Pipeline routing from meshtastic source to fake Matrix destination
#   - Codec, renderer, storage, and accounting paths function correctly
#
# What this config does NOT prove:
#   - Real inbound packet reception via the "meshtastic.receive" pubsub
#     callback. meshtasticd simulation mode (-s) may not relay packets
#     between TCP clients. Inbound packets arrive via simulate_inbound()
#     in tests, not from a second client through the daemon.
#   - Real LoRa radio interaction. meshtasticd runs in simulation mode.
#   - Sustained throughput, reconnect resilience, or load behavior.
#   - Live Matrix delivery. The Matrix adapter is fake.
#
# Usage:
#   1. Start meshtasticd in Docker:
#      docker run -d --name meshtasticd --network host \
#        meshtastic/meshtasticd:2.7.15 \
#        meshtasticd -s --fsdir=/var/lib/meshtasticd-ci -p 4403 -h 11
#
#   2. Set the host environment variable (defaults to localhost):
#      export MESHTASTIC_HOST=localhost
#
#   3. Run the config:
#      PYTHONPATH=src medre run --config examples/configs/docker-meshtastic-bridge.toml
#
# NOT for production. NOT a substitute for live radio validation.
#
# See also:
#   docs/runbooks/fake-bridge-evidence-criteria.md (Meshtastic evidence breakdown)
#   tests/integration/test_meshtasticd_sdk_bridge.py (Docker SDK-boundary tests)
#   tests/integration/conftest.py (MeshtasticdEnvironment fixture)

[runtime]
name = "docker-meshtastic-bridge"
shutdown_timeout_seconds = 10

[storage]
backend = "memory"

[logging]
level = "INFO"
format = "text"

# ---------------------------------------------------------------------------
# Real Meshtastic adapter — points at Docker meshtasticd
# ---------------------------------------------------------------------------
# Connection uses TCP to the containerized meshtasticd daemon.
# MESHTASTIC_HOST defaults to "localhost"; override for remote Docker hosts.
[adapters.meshtastic.daemon]
enabled = true
adapter_kind = "real"
connection_type = "tcp"
host = "${MESHTASTIC_HOST}"
port = 4403
origin_label = "TestMesh"

# ---------------------------------------------------------------------------
# Fake Matrix adapter — no SDK, no homeserver, no network
# ---------------------------------------------------------------------------
# Accepts the same config shape as a real Matrix adapter but ignores all
# network operations. Delivered payloads are captured in memory for
# inspection via diagnostics().
[adapters.matrix.fake_out]
enabled = true
adapter_kind = "fake"
homeserver = "https://fake.local"
user_id = "@bot:fake.local"
access_token = "tok_fake"
room_allowlist = ["!room:fake.local"]
encryption_mode = "plaintext"

# ---------------------------------------------------------------------------
# Routes — meshtasticd inbound → fake Matrix outbound
# ---------------------------------------------------------------------------
# Inbound packets from meshtasticd (channel 0) are routed to the fake
# Matrix adapter. In tests, inbound packets are injected via
# simulate_inbound() because meshtasticd simulation mode may not relay
# between TCP clients.
[routes.daemon_to_matrix]
source_adapters = ["daemon"]
dest_adapters = ["fake_out"]
directionality = "source_to_dest"
enabled = true
dest_channel = "0"
