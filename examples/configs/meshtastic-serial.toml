# MEDRE Example: Meshtastic via Serial
#
# Single Meshtastic adapter connected over USB-serial. This is the most
# common setup for a dedicated Meshtastic node attached to the host.

[runtime]
name = "meshtastic-serial"
shutdown_timeout_seconds = 30

[logging]
level = "INFO"
format = "text"

[storage]
backend = "sqlite"
path = "{state}/medre.sqlite"

[adapters.meshtastic.radio]
enabled = true
connection_type = "serial"
serial_port = "/dev/ttyACM0"

# Human-readable label used in log messages and cross-platform prefixes
origin_label = "medre-node"

# Suppress outbound radio sends while still receiving inbound traffic:
# outbound_mode = "listen_only"
