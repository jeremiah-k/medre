runtime:
  name: lxmf-sender

storage:
  backend: sqlite
  path: /tmp/medre-lxmf-sender.db

adapters:
  lxmf:
    lxmf_sender:
      enabled: true
      adapter_kind: real
      connection_type: reticulum # requires storage_path — set via MEDRE_ADAPTER__LXMF_SENDER__STORAGE_PATH
      # Wire identity and display name via env:
      #   MEDRE_ADAPTER__LXMF_SENDER__IDENTITY_PATH=/safe/path/sender.identity
      #   MEDRE_ADAPTER__LXMF_SENDER__DISPLAY_NAME=sender
      # Env-only adapter creation (no YAML) — see
      # docs/ops/configuration.md §"Env-First Adapter Creation".
