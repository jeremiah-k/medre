# MEDRE Example: Fake Multi-Adapter (Development / Testing)
#
# All four adapter types enabled with fake connection backends.
# No real hardware or Matrix homeserver required — everything is simulated.
#
# Use this for:
#   - Local development without hardware
#   - CI/CD pipeline testing
#   - Integration test baselines
#   - Rapid iteration on message routing logic
#
# adapter_kind: fake builds Fake*Adapter instances without importing
# optional live SDKs (mindroom-nio, meshtastic, etc.). Works in a core/dev
# install.

runtime:
  name: fake-multi-dev
  shutdown_timeout_seconds: 10

logging:
  level: DEBUG
  format: text

storage:
  backend: memory

adapters:
  # --- Matrix (fake) ---
  matrix:
    fake_matrix:
      enabled: true
      adapter_kind: fake
      homeserver: https://fake.local
      user_id: "@dev-bot:fake.local"
      access_token: fake_token_for_dev
      room_allowlist:
        - "!fake-room:fake.local"
      encryption_mode: plaintext

  # --- Meshtastic (fake) ---
  meshtastic:
    fake_meshtastic:
      enabled: true
      adapter_kind: fake
      connection_type: fake
      origin_label: dev-radio

  # --- MeshCore (fake) ---
  meshcore:
    fake_meshcore:
      enabled: true
      adapter_kind: fake
      connection_type: fake

  # --- LXMF (fake) ---
  lxmf:
    fake_lxmf:
      enabled: true
      adapter_kind: fake
      connection_type: fake
      display_name: MEDRE Dev LXMF

# ---------------------------------------------------------------------------
# Routes — bridge routes between fake adapters
# ---------------------------------------------------------------------------

routes:
  # Bidirectional bridge between Matrix and Meshtastic.
  matrix_mesh_bridge:
    source_adapters:
      - fake_matrix
    dest_adapters:
      - fake_meshtastic
    directionality: bidirectional
    enabled: true
    source_room: "!fake-room:fake.local"
    dest_channel: "1"
    policy:
      allowed_event_types:
        - message

  # Fan-out from Matrix to MeshCore and LXMF.
  matrix_fanout:
    source_adapters:
      - fake_matrix
    dest_adapters:
      - fake_meshcore
      - fake_lxmf
    directionality: source_to_dest
    enabled: true
    policy:
      allowed_event_types:
        - message
