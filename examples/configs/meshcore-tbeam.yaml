runtime:
  name: meshcore-tbeam

storage:
  backend: sqlite
  path: /tmp/medre-meshcore-tbeam.db

adapters:
  meshcore:
    meshcore_tbeam:
      enabled: true
      adapter_kind: real
      connection_type: ble # requires ble_address — set via MEDRE_ADAPTER__MESHCORE_TBEAM__BLE_ADDRESS
      # Wire the BLE address via env:
      #   MEDRE_ADAPTER__MESHCORE_TBEAM__BLE_ADDRESS="C4:4F:33:6A:B0:23"
      # Env-only adapter creation (no YAML) — see
      # docs/ops/configuration.md §"Env-First Adapter Creation".
