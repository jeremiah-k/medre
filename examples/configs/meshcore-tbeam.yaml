runtime:
  name: meshcore-tbeam

storage:
  backend: sqlite
  path: /tmp/medre-meshcore-tbeam.db

adapters:
  meshcore:
    meshcore_tbeam:
      enabled: true
      adapter_kind: meshcore
      connection_type: ble
      # Wire the BLE address via env:
      #   MEDRE_ADAPTER__MESHCORE_TBEAM__BLE_ADDRESS="C4:4F:33:6A:B0:23"
      # Or create entirely from env:
      #   MEDRE_ADAPTER__MESHCORE_TBEAM__TRANSPORT=meshcore
      #   MEDRE_ADAPTER__MESHCORE_TBEAM__CONNECTION_TYPE=ble
      #   MEDRE_ADAPTER__MESHCORE_TBEAM__BLE_ADDRESS="C4:4F:33:6A:B0:23"
