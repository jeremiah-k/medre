# MEDRE Example: Live Matrix <-> Meshtastic Bridge with Multi-Channel Map
#
# Bridges multiple Meshtastic radio channels to separate Matrix rooms using
# channel_room_map.  Each channel gets its own dedicated room.
#
# NOT for unattended production.  Use throwaway Matrix rooms and non-critical
# Meshtastic channels.
#
# Prerequisites:
#   pip install ".[matrix,meshtastic]"
#   A Meshtastic radio on /dev/ttyACM0 (or change serial_port below)
#   A Matrix bot account with a valid access token
#
# Usage:
#   medre run --config examples/configs/live-matrix-meshtastic-channel-map.yaml

runtime:
  name: live-channel-map
  shutdown_timeout_seconds: 30

logging:
  level: INFO # controls MEDRE namespace only; use DEBUG for bring-up visibility
  format: text
  # Dependency loggers stay quiet by default (root WARNING).
  # Use logging.overrides only when troubleshooting integrations — see docs/ops/configuration.md.

storage:
  backend: sqlite
  path: "{state}/medre.sqlite"

# ---------------------------------------------------------------------------
# Matrix transport
# ---------------------------------------------------------------------------
# Fill in your real homeserver URL, bot credentials, and room IDs below.
# The bot auto-joins every room listed in the channel_room_map.
adapters:
  matrix:
    main:
      enabled: true
      homeserver: "" # REQUIRED — your homeserver URL
      user_id: "" # REQUIRED — bot user ID (e.g. @mesh-bot:example.com)
      access_token: "" # REQUIRED — bot access token
      encryption_mode: plaintext # plaintext for bring-up; e2ee_required once vodozemac is installed
      # relay_prefix: "[{sender}/{origin_label}]: "  # Meshtastic→Matrix prefix via target-local config

  # ---------------------------------------------------------------------------
  # Meshtastic transport (serial)
  # ---------------------------------------------------------------------------
  meshtastic:
    radio:
      enabled: true
      connection_type: serial
      serial_port: /dev/ttyACM0
      origin_label: medre-radio
      radio_relay_prefix: "{sender_short}: " # Matrix→Meshtastic prefix

      # # --- TCP alternative (uncomment to use instead of serial) ---
      # connection_type: tcp
      # host: meshtastic.local
      # port: 4403

# ---------------------------------------------------------------------------
# Route — multi-channel bridge via channel_room_map
# ---------------------------------------------------------------------------
# channel_room_map expands this single route into one bidirectional pair
# per channel.  Channel keys are Meshtastic channel indices (0-7).
# Room values must be canonical Matrix room IDs (! prefix).
#
# The bot auto-joins every room listed here.  Channels not listed in the map
# are silently dropped — packets on unmapped channels are not relayed.
#
# To add more channels, extend the map up to channel 7:
#   "3": "!room3:example.com"
#   "4": "!room4:example.com"
#   ...

routes:
  radio_map:
    source_adapters:
      - main
    dest_adapters:
      - radio
    directionality: bidirectional
    enabled: true
    channel_room_map:
      "0": "!general:example.com"
      "1": "!admin:example.com"
      "2": "!alerts:example.com"
      # --- Per-entry origin labels (structured shape, commented out) ---
      # Each entry can also be a table carrying its own origin labels so the
      # relay prefix for that channel reads differently (for example, naming
      # the channel). The bare-string entries above carry no per-entry labels;
      # the structured shape below adds optional source_origin_label /
      # dest_origin_label per entry. Both shapes can be mixed in one map.
      #
      # "0":
      #   room: "!general:example.com"
      #   source_origin_label: "General"
      #   dest_origin_label: "Matrix Bridge"
      # "1":
      #   room: "!admin:example.com"
      #   source_origin_label: "Admin"
      # Per-entry labels override the route-level source_origin_label /
      # dest_origin_label for this entry's legs only; an unset (or omitted)
      # label falls back to the route-level value, then the adapter
      # origin_label. An explicit "" suppresses that fallback.
      # See docs/ops/configuration.md (Per-entry origin labels) and
      # docs/spec/routing-delivery.md §17.5.8.

      # --- Fan-in alternative (commented out) ---
      # Two (or more) Meshtastic channels can deliver into the SAME Matrix
      # room when the route does not also create a Matrix→Meshtastic leg.
      # Here directionality would need to be source_to_dest with a Meshtastic
      # source and Matrix destination (swap source_adapters/dest_adapters and
      # set directionality: source_to_dest to use this shape). Duplicate rooms
      # are rejected at route expansion when a Matrix→Meshtastic leg would be
      # created, because a Matrix event from the shared room is ambiguous
      # across channels. See docs/spec/routing-delivery.md §17.6.
      #
      # "0":
      #   room: "!shared:example.com"
      #   source_origin_label: "LongFast"
      # "1":
      #   room: "!shared:example.com"
      #   source_origin_label: "ShortFast"
