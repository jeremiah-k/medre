# MEDRE Example: Matrix Plaintext
#
# Minimal Matrix-only configuration using plaintext messaging (no E2EE).
# Ideal for public rooms, bot testing, or environments where encryption
# is handled at a different layer.

[runtime]
name = "matrix-plaintext"
shutdown_timeout_seconds = 30

[logging]
level = "INFO"
format = "text"

[storage]
backend = "filesystem"
# {state} resolves to the platform's default state directory
# Linux: ~/.local/state/medre   macOS: ~/Library/Application Support/medre
path = "{state}/store"

[adapters.matrix.main]
enabled = true
homeserver = "https://matrix.example.com"
user_id = "@medre-bot:example.com"
access_token = "syt_example_token_replace_me"

# Only bridge messages from these rooms (TOML array)
room_allowlist = ["!abcdef:example.com"]

# Plaintext mode — no encryption overhead, works with any room
encryption_mode = "plaintext"
